name: Build Native Features APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify clean repository structure
        shell: bash
        run: |
          set -euo pipefail
          test -f settings.gradle
          test -f build.gradle
          test -f gradle.properties
          test -f app/build.gradle
          test -f app/google-services.json
          test -f app/src/main/java/com/gal/familytrips/MainActivity.kt

          echo "Repository root:"
          pwd
          echo "Gradle files:"
          find . -maxdepth 3 -type f             \( -name 'settings.gradle*' -o -name 'build.gradle*' -o -name 'gradle.properties' \)             -print | sort

          COUNT="$(find . -type f \( -name settings.gradle -o -name settings.gradle.kts \) | wc -l)"
          test "$COUNT" -eq 1

          grep -q '^android.useAndroidX=true$' gradle.properties
          grep -q 'sourceCompatibility JavaVersion.VERSION_17' app/build.gradle
          grep -q 'targetCompatibility JavaVersion.VERSION_17' app/build.gradle
          grep -q "jvmTarget = '17'" app/build.gradle

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK 35
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Verify Google Routes configuration
        shell: bash
        env:
          ROUTES_WORKER_URL: ${{ secrets.ROUTES_WORKER_URL }}
          ROUTES_APP_TOKEN: ${{ secrets.ROUTES_APP_TOKEN }}
        run: |
          test -n "$ROUTES_WORKER_URL" || { echo "::error::Missing ROUTES_WORKER_URL secret"; exit 1; }
          test -n "$ROUTES_APP_TOKEN" || { echo "::error::Missing ROUTES_APP_TOKEN secret"; exit 1; }

      - name: Show Firebase SHA fingerprints
        shell: bash
        run: |
          KEYSTORE="app/debug.keystore"

          echo "============================================"
          echo "FIREBASE DEBUG SIGNING FINGERPRINTS"
          echo "============================================"

          if [ ! -f "$KEYSTORE" ]; then
            echo "::error::Missing stable debug keystore: $KEYSTORE"
            exit 1
          fi

          keytool -list -v \
            -keystore "$KEYSTORE" \
            -alias androiddebugkey \
            -storepass android \
            -keypass android > "$RUNNER_TEMP/keytool-output.txt"

          cat "$RUNNER_TEMP/keytool-output.txt"

          echo "============================================"
          echo "Expected stable fingerprints"
          echo "SHA1: 85:01:09:D8:12:D6:2C:B2:B1:0D:FA:A5:C8:BF:20:81:A3:29:0B:1D"
          echo "SHA256: D9:D9:A8:6F:16:29:5C:16:95:47:FB:B8:64:A2:BD:94:AF:6F:0E:F7:2A:71:3C:BD:22:63:2B:EA:E2:4E:D5:64"
          echo "============================================"

      - name: Build APK
        shell: bash
        env:
          ROUTES_WORKER_URL: ${{ secrets.ROUTES_WORKER_URL }}
          ROUTES_APP_TOKEN: ${{ secrets.ROUTES_APP_TOKEN }}
        run: |
          set -o pipefail
          gradle --no-daemon --stacktrace clean assembleDebug 2>&1 | tee build.log
          grep -E '^e:|^w:' build.log > compiler-diagnostics.txt || true

      - name: Verify APK
        shell: bash
        run: |
          test -f app/build/outputs/apk/debug/app-debug.apk
          ls -lh app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gal-Family-Trips-V8-6-2-3-SHA-Workflow-Fix-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Kotlin-Build-Log
          path: build.log
          if-no-files-found: ignore
          retention-days: 7
