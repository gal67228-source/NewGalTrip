name: Build Native Features APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify clean repository structure
        shell: bash
        run: |
          set -euo pipefail
          test -f settings.gradle
          test -f build.gradle
          test -f gradle.properties
          test -f app/build.gradle
          test -f app/src/main/java/com/gal/familytrips/MainActivity.kt

          echo "Repository root:"
          pwd
          echo "Gradle files:"
          find . -maxdepth 3 -type f             \( -name 'settings.gradle*' -o -name 'build.gradle*' -o -name 'gradle.properties' \)             -print | sort

          COUNT="$(find . -type f \( -name settings.gradle -o -name settings.gradle.kts \) | wc -l)"
          test "$COUNT" -eq 1

          grep -q '^android.useAndroidX=true$' gradle.properties
          grep -q 'sourceCompatibility JavaVersion.VERSION_17' app/build.gradle
          grep -q 'targetCompatibility JavaVersion.VERSION_17' app/build.gradle
          grep -q "jvmTarget = '17'" app/build.gradle

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK 35
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Verify Google Routes configuration
        shell: bash
        env:
          ROUTES_WORKER_URL: ${{ secrets.ROUTES_WORKER_URL }}
          ROUTES_APP_TOKEN: ${{ secrets.ROUTES_APP_TOKEN }}
        run: |
          test -n "$ROUTES_WORKER_URL" || { echo "::error::Missing ROUTES_WORKER_URL secret"; exit 1; }
          test -n "$ROUTES_APP_TOKEN" || { echo "::error::Missing ROUTES_APP_TOKEN secret"; exit 1; }

      - name: Show Firebase SHA fingerprints
        shell: bash
        run: |
          set -e

          KEYSTORE="$HOME/.android/debug.keystore"
          mkdir -p "$HOME/.android"

          if [ ! -f "$KEYSTORE" ]; then
            keytool -genkeypair \
              -v \
              -keystore "$KEYSTORE" \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000
          fi

          echo "============================================"
          echo "FIREBASE DEBUG SIGNING FINGERPRINTS"
          echo "============================================"

          keytool -list -v \
            -keystore "$KEYSTORE" \
            -alias androiddebugkey \
            -storepass android \
            -keypass android | grep -E "SHA1:|SHA256:"

          echo "============================================"
          echo "Copy both values into Firebase Project Settings"
          echo "============================================"

      - name: Build APK
        shell: bash
        env:
          ROUTES_WORKER_URL: ${{ secrets.ROUTES_WORKER_URL }}
          ROUTES_APP_TOKEN: ${{ secrets.ROUTES_APP_TOKEN }}
        run: |
          set -o pipefail
          gradle --no-daemon --stacktrace clean assembleDebug 2>&1 | tee build.log
          grep -E '^e:|^w:' build.log > compiler-diagnostics.txt || true

      - name: Verify APK
        shell: bash
        run: |
          test -f app/build/outputs/apk/debug/app-debug.apk
          ls -lh app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gal-Family-Trips-V8-6-0-Cloud-Foundation-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Kotlin-Build-Log
          path: build.log
          if-no-files-found: ignore
          retention-days: 7
